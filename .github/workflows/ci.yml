name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run backend tests
      env:
        DATABASE_URL: sqlite:///:memory:
        FINRELIEF_SECRET_KEY: dummy_jwt_signing_secret_for_ci_runs_123456789
        GEMINI_API_KEY: dummy_gemini_api_key_to_trigger_fallback
        FRONTEND_URL: http://localhost:5173
      run: |
        pytest backend/tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      working-directory: frontend
      run: npm install

    - name: Run linter
      working-directory: frontend
      run: npm run lint

    - name: Run production build
      working-directory: frontend
      run: npm run build
